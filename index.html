.card,.item,.kpi{

}
.btn.secondary,.smallbtn{

  color:#dbeafe;
  border:1px solid rgba(148,163,184,.2);
}
.btn.green{background:linear-gradient(135deg,#16a34a,#22c55e);color:#03140a;}
.btn.orange{background:linear-gradient(135deg,#d97706,#f59e0b);color:#120a00;}
.btn.red{background:linear-gradient(135deg,#dc2626,#ef4444);}
input,select,textarea{
  color:#f8fafc;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}

  background:rgba(56,189,248,.12);

.pill.orange{background:rgba(245,158,11,.13);color:#fcd34d;border:1px solid rgba(245,158,11,.22);}

.winBadge{

  color:#160b00;
  box-shadow:0 0 24px rgba(251,191,36,.25);
}
.tag{background:rgba(148,163,184,.07);border-color:rgba(148,163,184,.18);color:#bac7d8;}
.checkItem{background:rgba(56,189,248,.06);border-color:rgba(148,163,184,.18);}

.menuBackdrop{background:rgba(0,0,0,.68);backdrop-filter:blur(2px);}

function calcTotals(propId=''){const projects=state.projects.filter(x=>!propId||x.propertyId===propId), training=state.training.filter(x=>!propId||x.propertyId===propId), findings=state.findings.filter(x=>!propId||x.propertyId===propId), visits=(state.visits||[]).filter(x=>!propId||x.propertyId===propId); const soft=projects.reduce((s,x)=>s+(+x.soft||0),0); const capital=projects.reduce((s,x)=>s+(+x.budget||0),0); return {soft,capital,total:soft,projects,training,findings,visits}}
function supportScore(propId){const t=calcTotals(propId); const tasks=state.tasks.filter(x=>x.propertyId===propId); const completedTasks=tasks.filter(x=>x.status==='Completed').length; const openHighRisk=t.findings.filter(x=>['High','Critical'].includes(x.risk)&&!['Completed','Cancelled'].includes(x.status)).length; const wins=[...t.projects,...t.training,...t.findings,...t.visits].filter(x=>String(x.majorWin)==='true'||x.majorWin===true).length; const raw=(t.visits.length*12)+(t.projects.length*10)+(t.training.length*8)+(t.findings.length*7)+(completedTasks*5)+(wins*12)-Math.min(openHighRisk*8,24); const score=Math.max(0,Math.min(100,Math.round(raw))); let level='Light Support',cls=''; if(score>=75){level='High Support';cls='green'} else if(score>=40){level='Active Support';cls='orange'} else if(score>0){level='Light Support';cls=''} else {level='No Activity';cls='red'} return {score,level,cls,visits:t.visits.length,projects:t.projects.length,training:t.training.length,findings:t.findings.length,tasks:tasks.length,completedTasks,wins,openHighRisk}}
function supportScoreCard(propId){const s=supportScore(propId); return `<span class="scoreBadge ${s.cls}">Support Score: ${s.score} • ${s.level}</span><div class="scoreBar"><div class="scoreFill" style="width:${s.score}%"></div></div><div class="supportExplain">Based on visits, projects, training, findings, completed follow-ups, major wins, and open high-risk findings.</div>`}

function renderDashboard(){const t=calcTotals(); const open=state.projects.filter(x=>!['Completed','Cancelled'].includes(x.status)).length+state.findings.filter(x=>!['Completed','Cancelled'].includes(x.status)).length+state.tasks.filter(x=>!['Completed','Cancelled'].includes(x.status)).length; const recent=[...state.projects.map(x=>({...x,type:'Project',date:x.start||x.date,title:x.name})),...state.training.map(x=>({...x,type:'Training',title:x.topic})),...state.findings.map(x=>({...x,type:'Finding',title:x.area||'Finding'})),...(state.visits||[]).map(x=>({...x,type:'Visit',date:x.date,title:propName(x.propertyId)}))].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8); const wins=[...state.projects.map(x=>({...x,type:'Project',title:x.name})),...state.training.map(x=>({...x,type:'Training',title:x.topic})),...state.findings.map(x=>({...x,type:'Finding',title:x.area||'Finding'})),...(state.visits||[]).map(x=>({...x,type:'Visit',date:x.date,title:propName(x.propertyId)}))].filter(x=>String(x.majorWin)==='true'||x.majorWin===true).slice(0,6); const highFindings=state.findings.filter(x=>['High','Critical'].includes(x.risk)&&!['Completed','Cancelled'].includes(x.status)).slice(0,6); const completedProjects=state.projects.filter(x=>x.status==='Completed').slice(0,6); const recentTraining=state.training.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,6); const supportedProps=[...new Set([...state.projects,...state.training,...state.findings,...(state.visits||[])].map(x=>x.propertyId).filter(Boolean))]; const topSupport=state.properties.map(p=>({p,s:supportScore(p.id)})).filter(x=>x.s.score>0).sort((a,b)=>b.s.score-a.s.score).slice(0,6); const openRisks=state.findings.filter(x=>!['Completed','Cancelled'].includes(x.status)).slice(0,6); const highlightItems=[]; if(wins.length)highlightItems.push(`<div class="item"><b>Major Wins</b><p>${wins.map(x=>esc(propName(x.propertyId))+' - '+esc(x.title||x.name||x.topic||'Item')).join('<br>')}</p></div>`); if(highFindings.length)highlightItems.push(`<div class="item"><b>High-Risk Findings</b><p>${highFindings.map(x=>esc(propName(x.propertyId))+' - '+esc(x.area||'Finding')+' ('+esc(x.risk)+')').join('<br>')}</p></div>`); if(completedProjects.length)highlightItems.push(`<div class="item"><b>Completed Projects</b><p>${completedProjects.map(x=>esc(propName(x.propertyId))+' - '+esc(x.name)).join('<br>')}</p></div>`); if(recentTraining.length)highlightItems.push(`<div class="item"><b>Recent Training</b><p>${recentTraining.map(x=>esc(propName(x.propertyId))+' - '+esc(x.topic)).join('<br>')}</p></div>`); highlightItems.push(`<div class="item"><b>Properties Supported</b><p>${supportedProps.length} properties have logged support activity.</p></div>`); if(topSupport.length)highlightItems.push(`<div class="item"><b>Top Property Support Scores</b><p>${topSupport.map(x=>esc(x.p.name)+' - '+x.s.score+' • '+esc(x.s.level)).join('<br>')}</p></div>`); if(openRisks.length)highlightItems.push(`<div class="item"><b>Open Risks Needing Awareness</b><p>${openRisks.map(x=>esc(propName(x.propertyId))+' - '+esc(x.area||'Finding')+' - '+esc(x.status||'Open')).join('<br>')}</p></div>`); $('dashboard').innerHTML=`<div class="grid cards">${metric('Estimated Value',money(t.soft),'Project and risk prevention')}${metric('Project Cost Total',money(t.capital),'Project dollars influenced')}${metric('Total Value Created',money(t.total),'Estimated project and finding value')}${metric('Properties',state.properties.length,'Hotel profiles')}${metric('Projects',state.projects.length,'Project records')}${metric('Training Sessions',state.training.length,'Training logs')}${metric('Property Visits',(state.visits||[]).length,'Visit records')}${metric('Open Follow-Ups',open,'Open projects, findings, and tasks')}</div><div class="card" style="margin-top:12px"><h3>Executive Highlights</h3><div class="list">${highlightItems.join('')||'<div class="empty">Start logging projects, training, findings, visits, and major wins to build executive highlights.</div>'}</div></div><div class="grid two" style="margin-top:12px"><div class="card"><h3>Recent Activity</h3><div class="list">${recent.length?recent.map(activityCard).join(''):'<div class="empty">No activity yet. Use the menu to add projects, training, findings, visits, or follow-ups.</div>'}</div></div><div class="card"><h3>Major Wins</h3><div class="list">${wins.length?wins.map(activityCard).join(''):'<div class="empty">Mark items as Major Win to highlight them here.</div>'}</div></div></div>`}

ass="list">${t.findings.map(x=>findingCard(x)).join('')||'<div class="empty">No findings yet.</div>'}</div></div><div class="card"><h3>Follow-Up Tasks</h3><div class="list">${tasks.map(taskCard).join('')||'<div class="empty">No tasks yet.</div>'}</div></div><div class="card"><h3>Visit Log</h3><div class="list">${t.visits.map(visitCard).join('')||'<div class="empty">No visits yet.</div>'}</div></div></div>`}

  background:linear-gradient(180deg,#111827,#070a0f);
  border:1px solid rgba(56,189,248,.22);
  color:#e5f7ff;
  box-shadow:0 10px 28px rgba(0,0,0,.4);
}
.side{
  background:
    radial-gradient(circle at top left,rgba(56,189,248,.20),transparent 38%),
    linear-gradient(180deg,#05070a,#070b12 45%,#030406);
  border-right:1px solid rgba(56,189,248,.22);
  box-shadow:24px 0 70px rgba(0,0,0,.72);
}
.logo{
  width:50px;height:50px;border-radius:18px;
  background:linear-gradient(135deg,#0ea5e9,#22c55e);
  box-shadow:0 0 30px rgba(56,189,248,.35);
}
.brand h1{color:#fff;letter-spacing:-.02em}.brand p{color:#9fb2c8}
.nav{gap:7px}.nav button{
  border:1px solid transparent;
  color:#cbd5e1;
  font-weight:800;
}
.nav button.active,.nav button:hover{
  background:rgba(56,189,248,.12);
  color:#fff;
  border-color:rgba(56,189,248,.25);
  box-shadow:inset 3px 0 0 #38bdf8;
}
.card,.item,.kpi,.empty,.modalbox,input,select,textarea{
  background:linear-gradient(180deg,#0f141b,#090d12);
  border-color:rgba(148,163,184,.18);
}
.card,.item,.kpi{
  box-shadow:0 16px 40px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.035);
}
.card:hover,.item:hover{border-color:rgba(56,189,248,.32);}
.metric small,.kpi small,.field label{color:#8ea3ba;letter-spacing:.06em;}
.metric strong,.kpi b{color:#ffffff;text-shadow:0 0 20px rgba(56,189,248,.10);}
.btn{
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
  box-shadow:0 12px 28px rgba(14,165,233,.20),0 12px 30px rgba(0,0,0,.35);
}
.btn.secondary,.smallbtn{
  background:#101722;
  color:#dbeafe;
  border:1px solid rgba(148,163,184,.2);
}
.btn.green{background:linear-gradient(135deg,#16a34a,#22c55e);color:#03140a;}
.btn.orange{background:linear-gradient(135deg,#d97706,#f59e0b);color:#120a00;}
.btn.red{background:linear-gradient(135deg,#dc2626,#ef4444);}
input,select,textarea{
  color:#f8fafc;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
input::placeholder,textarea::placeholder{color:#64748b;}
.pill{
  background:rgba(56,189,248,.12);
  color:#7dd3fc;
  border:1px solid rgba(56,189,248,.20);
}
.pill.green{background:rgba(34,197,94,.13);color:#86efac;border:1px solid rgba(34,197,94,.22);}
.pill.orange{background:rgba(245,158,11,.13);color:#fcd34d;border:1px solid rgba(245,158,11,.22);}
.pill.red{background:rgba(239,68,68,.13);color:#fca5a5;border:1px solid rgba(239,68,68,.22);}
.winBadge{
  background:linear-gradient(135deg,#fbbf24,#f97316);
  color:#160b00;
  box-shadow:0 0 24px rgba(251,191,36,.25);
}
.tag{background:rgba(148,163,184,.07);border-color:rgba(148,163,184,.18);color:#bac7d8;}
.checkItem{background:rgba(56,189,248,.06);border-color:rgba(148,163,184,.18);}
.calcNote{background:rgba(56,189,248,.06);border-color:rgba(56,189,248,.22);}
.menuBackdrop{background:rgba(0,0,0,.68);backdrop-filter:blur(2px);}
.reportbox{background:rgba(255,255,255,.02);border-radius:16px;padding:12px;border:1px solid rgba(148,163,184,.14);}
@media(max-width:840px){
  .top{align-items:stretch}.titleRow{align-items:center}.actions{grid-template-columns:1fr 1fr}
}
